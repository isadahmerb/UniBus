<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBus — Roteiro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { padding-bottom: 80px; }

        .header-mobile {
            background-color: #2d2d55;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-mobile h2 { font-size: 18px; color: #fff; }
        .header-mobile span { font-size: 13px; color: #b0b0d0; }

        .status-bar {
            background-color: #4a4a7a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #mapa {
            width: 100%;
            height: 320px;
        }

        .container-mobile { padding: 16px 20px; }

        .passageiros-header {
            background-color: #4a4a7a;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 4px;
            user-select: none;
        }

        .passageiros-header:hover { background-color: #52527a; }

        .passageiros-header span { font-size: 15px; font-weight: 600; color: #fff; }

        .passageiros-lista { overflow: hidden; transition: max-height 0.3s ease; max-height: 0; }
        .passageiros-lista.aberto { max-height: 1000px; }

        .passageiro-item {
            background-color: #3d3d6b;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .passageiro-nome { font-size: 15px; font-weight: 600; color: #fff; }
        .passageiro-end { font-size: 12px; color: #b0b0d0; margin-top: 2px; }

        .seta { font-size: 18px; color: #b0b0d0; transition: transform 0.3s; }
        .seta.aberto { transform: rotate(180deg); }

        .btn-fixed {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            padding: 16px;
            font-size: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header-mobile">
        <div>
            <h2>UniBus</h2>
            <span>Transportes</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="nomeMotorista" style="color:#b0b0d0; font-size:13px;"></span>
            <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="status-bar">
        <div>
            <div style="font-size:13px; color:#b0b0d0;">Sua rota</div>
            <div id="rotaNome" style="font-size:16px; font-weight:600; color:#fff;">—</div>
        </div>
        <span id="statusViagem" class="badge badge-info">Aguardando</span>
    </div>

    <div id="mapa"></div>

    <div class="container-mobile">
        <div class="passageiros-header" onclick="togglePassageiros()">
            <span id="totalPassageiros">Lista de passageiros</span>
            <span class="seta" id="seta">▼</span>
        </div>
        <div class="passageiros-lista" id="passageirosLista">
            <div id="listaPassageiros"></div>
        </div>
    </div>

    <button class="btn-fixed" id="btnAcao" onclick="acaoViagem()" style="background-color:#4caf7d; color:white; display:none;">
        Iniciar rota
    </button>

    <!-- Modal selecionar viagem -->
    <div class="modal-overlay active" id="modalViagem">
        <div class="modal">
            <h3>Viagem do dia</h3>
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="dataViagem">
            </div>
            <div class="form-group">
                <label>Viagem</label>
                <select id="viagemSelect">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="selecionarViagem()" style="width:100%; padding:14px;">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        window.getToken = () => localStorage.getItem('tokenMotorista');
    </script>
    <script src="../js/api.js"></script>
    <script>
        const tokenMotorista = localStorage.getItem('tokenMotorista');
        if (!tokenMotorista) window.location.href = 'login.html';

        const motorista = JSON.parse(localStorage.getItem('motorista') || '{}');
        document.getElementById('nomeMotorista').textContent = motorista.nome || '';

        let viagemAtual = null;
        let intervaloGPS = null;
        let mapa = null;
        let marcador = null;
        let rotaLinha = null;
        let marcadoresRota = [];

        // Pontos simulados de rota (região de Florianópolis)
        const pontosSimulados = [
            { lat: -27.5935, lng: -48.5585, label: 'Ponto de partida' },
            { lat: -27.6050, lng: -48.5200, label: 'Parada 1 — Trindade' },
            { lat: -27.5800, lng: -48.5050, label: 'Parada 2 — Agronômica' },
            { lat: -27.5650, lng: -48.4950, label: 'Destino final — UFSC' },
        ];

        // Inicializa mapa
        mapa = L.map('mapa').setView([-27.5935, -48.5585], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataViagem').value = hoje;
        document.getElementById('dataViagem').addEventListener('change', carregarViagens);

        function togglePassageiros() {
            const lista = document.getElementById('passageirosLista');
            const seta = document.getElementById('seta');
            lista.classList.toggle('aberto');
            seta.classList.toggle('aberto');
        }

        async function carregarViagens() {
            const data = document.getElementById('dataViagem').value;
            const viagens = await api.get('/viagens').then(r => r.json());
            const filtradas = viagens.filter(v => v.data === data && v.motoristaId === motorista.id);
            const select = document.getElementById('viagemSelect');
            if (filtradas.length === 0) {
                select.innerHTML = '<option value="">Nenhuma viagem para esta data</option>';
            } else {
                select.innerHTML = filtradas.map(v =>
                    `<option value="${v.id}">${v.rotaNome}</option>`
                ).join('');
            }
        }

        async function selecionarViagem() {
            const id = document.getElementById('viagemSelect').value;
            if (!id) return;
            const viagens = await api.get('/viagens').then(r => r.json());
            viagemAtual = viagens.find(v => v.id == id);
            document.getElementById('rotaNome').textContent = viagemAtual.rotaNome;
            document.getElementById('modalViagem').classList.remove('active');
            atualizarStatus();
            carregarPassageiros();
        }

        async function carregarPassageiros() {
            const passageiros = await api.get(`/viagens/${viagemAtual.id}/roteiro`).then(r => r.json());
            document.getElementById('totalPassageiros').textContent = `Lista de passageiros (${passageiros.length} confirmado(s))`;
            const lista = document.getElementById('listaPassageiros');
            if (passageiros.length === 0) {
                lista.innerHTML = '<div style="text-align:center; color:#9090c0; padding:20px;">Nenhum passageiro confirmado</div>';
                return;
            }
            lista.innerHTML = passageiros.map(p => `
                <div class="passageiro-item" style="border-left: 4px solid ${p.status === 'CONFIRMADO' ? '#4caf7d' : '#e05555'};">
                    <div>
                        <div class="passageiro-nome">${p.passageiroNome}</div>
                        <div class="passageiro-end">${p.enderecoDoDia || '—'}</div>
                    </div>
                    <span class="badge ${p.status === 'CONFIRMADO' ? 'badge-success' : 'badge-danger'}">${p.status}</span>
                </div>
            `).join('');
        }

        function atualizarStatus() {
            if (!viagemAtual) return;
            const statusEl = document.getElementById('statusViagem');
            const btnAcao = document.getElementById('btnAcao');

            statusEl.textContent = viagemAtual.status;
            statusEl.className = 'badge ' + (
                viagemAtual.status === 'AGENDADA' ? 'badge-info' :
                viagemAtual.status === 'EM_ANDAMENTO' ? 'badge-warning' :
                viagemAtual.status === 'CONCLUIDA' ? 'badge-success' : 'badge-danger'
            );

            if (viagemAtual.status === 'AGENDADA') {
                btnAcao.style.display = 'block';
                btnAcao.textContent = 'Iniciar rota';
                btnAcao.style.backgroundColor = '#4caf7d';
            } else if (viagemAtual.status === 'EM_ANDAMENTO') {
                btnAcao.style.display = 'block';
                btnAcao.textContent = 'Finalizar rota';
                btnAcao.style.backgroundColor = '#e05555';
                iniciarGPS();
                desenharRota();
            } else {
                btnAcao.style.display = 'none';
                pararGPS();
            }
        }

        function desenharRota() {
            // Remove rota anterior
            if (rotaLinha) mapa.removeLayer(rotaLinha);
            marcadoresRota.forEach(m => mapa.removeLayer(m));
            marcadoresRota = [];

            const coords = pontosSimulados.map(p => [p.lat, p.lng]);

            // Desenha linha da rota
            rotaLinha = L.polyline(coords, { color: '#4f46e5', weight: 4, opacity: 0.8 }).addTo(mapa);

            // Adiciona marcadores nos pontos
            pontosSimulados.forEach((p, i) => {
                const cor = i === 0 ? '#4caf7d' : i === pontosSimulados.length - 1 ? '#e05555' : '#f0a500';
                const icone = L.divIcon({
                    className: '',
                    html: `<div style="background:${cor}; width:14px; height:14px; border-radius:50%; border:2px solid white;"></div>`,
                    iconSize: [14, 14],
                });
                const m = L.marker([p.lat, p.lng], { icon: icone })
                    .addTo(mapa)
                    .bindPopup(p.label);
                marcadoresRota.push(m);
            });

            // Ajusta zoom para mostrar toda a rota
            mapa.fitBounds(rotaLinha.getBounds(), { padding: [20, 20] });
        }

        async function acaoViagem() {
            if (!viagemAtual) return;
            const novoStatus = viagemAtual.status === 'AGENDADA' ? 'EM_ANDAMENTO' : 'CONCLUIDA';
            const response = await api.patch(`/viagens/${viagemAtual.id}/status?status=${novoStatus}`);
            if (response && response.ok) {
                if (novoStatus === 'CONCLUIDA') pararGPS();
                viagemAtual.status = novoStatus;
                atualizarStatus();
            }
        }

        function iniciarGPS() {
            if (intervaloGPS || !navigator.geolocation) return;
            intervaloGPS = setInterval(() => {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    if (marcador) {
                        marcador.setLatLng([lat, lng]);
                    } else {
                        marcador = L.marker([lat, lng]).addTo(mapa).bindPopup('Você está aqui');
                    }
                    api.post(`/viagens/${viagemAtual.id}/localizacao`, { latitude: lat, longitude: lng });
                });
            }, 10000);
        }

        function pararGPS() {
            if (intervaloGPS) { clearInterval(intervaloGPS); intervaloGPS = null; }
        }

        function sair() {
            localStorage.removeItem('tokenMotorista');
            localStorage.removeItem('motorista');
            window.location.href = 'login.html';
        }

        carregarViagens();
    </script>
</body>
</html>
