<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBus — Motoristas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <h2>UniBus</h2>
        <div style="display:flex; align-items:center; gap:16px;">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="motoristas.html" class="nav-link">Motoristas</a>
            <a href="rotas.html" class="nav-link">Rotas</a>
            <a href="contratos.html" class="nav-link">Contratos</a>
            <span id="nomeAdmin"></span>
            <button onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="table-wrapper" style="margin-top:24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h2>Motoristas</h2>
                <button class="btn btn-danger" onclick="abrirModal()">+ Novo Motorista</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>CNH</th>
                        <th>Vencimento CNH</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaMotoristas"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal novo motorista -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitulo">Novo Motorista</h3>
            <input type="hidden" id="motoristaId">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@exemplo.com">
            </div>
            <div class="form-group" id="senhaGroup">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="00000000000">
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="48999999999">
            </div>
            <div class="form-group">
                <label>Número CNH</label>
                <input type="text" id="numeroCnh" placeholder="00000000000">
            </div>
            <div class="form-group">
                <label>Vencimento CNH</label>
                <input type="date" id="vencimentoCnh">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-danger" id="btnSalvar" onclick="salvar()">Salvar</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (!getToken()) window.location.href = '../index.html';
        document.getElementById('nomeAdmin').textContent = localStorage.getItem('usuario') || 'Admin';

        let modoEdicao = false;

        async function carregarMotoristas() {
            const motoristas = await api.get('/motoristas').then(r => r.json());
            const tbody = document.getElementById('tabelaMotoristas');
            tbody.innerHTML = motoristas.map(m => `
                <tr>
                    <td>${m.nome}</td>
                    <td>${m.email}</td>
                    <td>${m.telefone || '—'}</td>
                    <td>${m.numeroCnh || '—'}</td>
                    <td>${m.vencimentoCnh || '—'}</td>
                    <td><span class="badge ${m.ativo ? 'badge-success' : 'badge-danger'}">${m.ativo ? 'Ativo' : 'Inativo'}</span></td>
                    <td style="display:flex; gap:8px;">
                        <button class="btn btn-secondary" style="padding:4px 10px; font-size:12px;" onclick="abrirEdicao(${m.id}, '${m.nome}', '${m.email}', '${m.telefone || ''}', '${m.numeroCnh || ''}', '${m.vencimentoCnh || ''}')">Editar</button>
                        ${m.ativo ? `<button class="btn btn-danger" style="padding:4px 10px; font-size:12px;" onclick="desativar(${m.id})">Desativar</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function abrirModal() {
            modoEdicao = false;
            document.getElementById('modalTitulo').textContent = 'Novo Motorista';
            document.getElementById('motoristaId').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('email').value = '';
            document.getElementById('senha').value = '';
            document.getElementById('cpf').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('numeroCnh').value = '';
            document.getElementById('vencimentoCnh').value = '';
            document.getElementById('senhaGroup').style.display = 'block';
            document.getElementById('email').disabled = false;
            document.getElementById('cpf').disabled = false;
            document.getElementById('modal').classList.add('active');
        }

        function abrirEdicao(id, nome, email, telefone, numeroCnh, vencimentoCnh) {
            modoEdicao = true;
            document.getElementById('modalTitulo').textContent = 'Editar Motorista';
            document.getElementById('motoristaId').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('email').value = email;
            document.getElementById('telefone').value = telefone;
            document.getElementById('numeroCnh').value = numeroCnh;
            document.getElementById('vencimentoCnh').value = vencimentoCnh;
            document.getElementById('senhaGroup').style.display = 'none';
            document.getElementById('email').disabled = true;
            document.getElementById('cpf').disabled = true;
            document.getElementById('modal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function salvar() {
            if (modoEdicao) {
                const id = document.getElementById('motoristaId').value;
                const body = {
                    nome: document.getElementById('nome').value,
                    telefone: document.getElementById('telefone').value,
                    numeroCnh: document.getElementById('numeroCnh').value,
                    vencimentoCnh: document.getElementById('vencimentoCnh').value,
                };
                const response = await api.put(`/motoristas/${id}`, body);
                if (response && response.ok) { fecharModal(); carregarMotoristas(); }
            } else {
                const body = {
                    nome: document.getElementById('nome').value,
                    email: document.getElementById('email').value,
                    senha: document.getElementById('senha').value,
                    cpf: document.getElementById('cpf').value,
                    telefone: document.getElementById('telefone').value,
                    numeroCnh: document.getElementById('numeroCnh').value,
                    vencimentoCnh: document.getElementById('vencimentoCnh').value,
                };
                const response = await api.post('/motoristas', body);
                if (response && response.ok) { fecharModal(); carregarMotoristas(); }
            }
        }

        async function desativar(id) {
            if (!confirm('Desativar este motorista?')) return;
            const response = await api.delete(`/motoristas/${id}`);
            if (response && response.ok) carregarMotoristas();
        }

        carregarMotoristas();
    </script>
</body>
</html>
